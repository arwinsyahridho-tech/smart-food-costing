</div> `; } function render(){ const keyword = el.search.value.trim().toLowerCase(); const filtered = rawMaterials.filter(item => { const haystack = [ item.nama, item.merk, item.kategori, item.supplier, item.buyUnit, item.unit ].join(" ").toLowerCase(); return haystack.includes(keyword); }); if(!filtered.length){ el.list.innerHTML = `<div class="section" style="text-align:center;opacity:.7;">Belum ada data bahan</div>`; return; } el.list.innerHTML = filtered.map((item, index) => { const originalIndex = rawMaterials.indexOf(item); return renderRawMaterialCard(item, originalIndex); }).join("");
} async function addItem(){ const data = readForm(); if(!data.nama){ alert("Isi Nama Bahan"); el.nama.focus(); return; } setBusy(true); try { data.kategori = await ensureRawMaterialCategory(); const saved = await persistRawMaterials("insert", data); rawMaterials.unshift(saved); clearForm(); render(); } catch(error){ console.error("Gagal tambah raw material:", error); if(error?.message !== "Nama kategori baru kosong.") alert("Gagal menyimpan Raw Material ke Supabase."); } finally { setBusy(false); }

} async function deleteItem(index){ const item = rawMaterials[index]; if(!item || !confirm("Hapus data bahan ini?")) return; setBusy(true); try { await persistRawMaterials("delete", item); rawMaterials.splice(index, 1); render(); } catch(error){ console.error("Gagal hapus raw material:", error); alert("Gagal menghapus Raw Material dari Supabase."); } finally { setBusy(false); }
} el.harga.addEventListener("input", () => { const n = numberOnly(el.harga.value); el.harga.value = n ? rupiah(n) : "";
}); el.eHarga.addEventListener("input", () => { const n = numberOnly(el.eHarga.value); el.eHarga.value = n ? rupiah(n) : "";

ner('click', (event) => { if(!mobileQuery.matches) return; if(event.target.closest('a, .item, .btn')) closeSidebar(); }); document.addEventListener('keydown', (event) => { if(event.key === 'Escape') closeSidebar(); }); const syncLayout = () => { if(mobileQuery.matches){ sidebar.setAttribute('aria-hidden', sidebar.classList.contains('open') ? 'false' : 'true'); } else { closeSidebar(); sidebar.setAttribute('aria-hidden','false'); } }; mobileQuery.addEventListener ? mobileQuery.addEventListener('change', syncLayout) : mobileQuery.addListener(syncLayout); syncLayout();
