<option>Liter</option>
<option>Pcs</option>
</select>
</div>

<label>Harga Beli</label>
<input id="hargaInput" inputmode="numeric" placeholder="Rp 0"/>
</div>
</div>
</section>
<section class="section">
<div class="sectionTitle">KONVERSI</div>
<div class="grid3">
<div class="field">
<label>Conversion Qty</label>
<input id="conversionInput" placeholder="1000" type="number"/>
</div>
<div class="field">
<label>Unit Dasar</label>
<select id="unitDasarInput">

<option>pcs</option>

</div>

<button class="btn-action" id="tambahBtn">+ Tambah Bahan</button>

</section>
<div class="search">
<input id="searchInput" placeholder="Cari bahan..."/>
</div>
<div id="listContainer"></div>
</main>
</div>
<div class="modal" id="editModal">
<div class="modalBox">
<div class="modalTitle">Edit Bahan</div>
<div class="grid">
<div class="field">
<label>Nama</label>
<input id="eNama"/>
</div>
<div class="field">
<label>Merk</label>
<input id="eMerk"/>
</div>
<div class="field">
<label>Kategori</label>
<select id="eKategori">
<option>Bahan Kering</option>
<option>Bahan Basah</option>
<option>Buah</option>

</select>
</div>

<label>Supplier</label>
<input id="eSupplier"/>
</div>
<div class="field">
<label>Qty</label>
<input id="eQty" type="number"/>
</div>
<div class="field">
<label>Buy Unit</label>
<select id="eBuyUnit">
<option>Kg</option>
<option>Pack</option>
<option>Liter</option>
<option>Pcs</option>
</select>
</div>
<div class="field">
<label>Harga</label>

</div>
<div class="field">
<label>Konversi</label>
<input id="eConversion" type="number"/>
</div>
<div class="field">
<label>Unit</label>
<select id="eUnit">

</div>
</div>
</div>
<script>
const rawMaterials = []; const storedRawMaterials = JSON.parse(localStorage.getItem("biya_rawMaterials") || "null"); if (Array.isArray(storedRawMaterials) && storedRawMaterials.length) { rawMaterials.splice(0, rawMaterials.length, ...storedRawMaterials); } function persistRawMaterials(){ localStorage.setItem("biya_rawMaterials", JSON.stringify(rawMaterials)); localStorage.setItem("biya_rawMaterials_updated", new Date().toISOString()); } let editIndex = null; const el = { nama: document.getElementById("namaInput"), merk: document.getElementById("merkInput"), kategori: document.getElementById("kategoriInput"), supplier: document.getElementById("supplierInput"), qty: document.getElementById("qtyInput"), buyUnit: document.getElementById("buyUnitInput"), harga: document.getElementById("hargaInput"), conversion: document.getElementById("conversionInput"), unit: document.getElementById("unitDasarInput"), waste: document.getElementById("wasteInput"), search: document.getElementById("searchInput"), list: document.getElementById("listContainer"), modal: document.getElementById("editModal"), eNama: document.getElementById("eNama"), eMerk: document.getElementById("eMerk"), eKategori: document.getElementById("eKategori"), eSupplier: document.getElementById("eSupplier"), eQty: document.getElementById("eQty"), eBuyUnit: document.getElementById("eBuyUnit"), eHarga: document.getElementById("eHarga"), eConversion: document.getElementById("eConversion"), eUnit: document.getElementById("eUnit"), eWaste: document.getElementById("eWaste")
}; function titleCase(text){ return String(text || "") .trim() .toLowerCase() .replace(/\b\w/g, c => c.toUpperCase());
} function rupiah(value){ const n = Math.round(Number(value) || 0); return "Rp " + n.toLocaleString("id-ID");
} function numberOnly(v){ return String(v || "").replace(/[^\d]/g, "");
} function calcHargaPerUnit(item){ const conv = Number(item.conversion) || 0; const harga = Number(item.harga) || 0; return conv ? harga / conv : 0;
} function readForm(){ return { nama: titleCase(el.nama.value), merk: titleCase(el.merk.value), kategori: el.kategori.value, supplier: titleCase(el.supplier.value), qty: Number(el.qty.value) || 0, buyUnit: el.buyUnit.value, harga: Number(numberOnly(el.harga.value)) || 0, conversion: Number(el.conversion.value) || 0, unit: el.unit.value, waste: Number(el.waste.value) || 0 };
} function clearForm(){ el.nama.value = ""; el.merk.value = ""; el.supplier.value = ""; el.qty.value = 1; el.buyUnit.value = "Kg"; el.harga.value = ""; el.conversion.value = ""; el.unit.value = "gr"; el.waste.value = 5;
} function render(){ const keyword = el.search.value.trim().toLowerCase(); const filtered = rawMaterials.filter(item => { const haystack = [ item.nama, item.merk, item.kategori, item.supplier, item.buyUnit, item.unit ].join(" ").toLowerCase(); return haystack.includes(keyword); }); if(!filtered.length){ el.list.innerHTML = `<div class="section" style="text-align:center;opacity:.7;">Belum ada data bahan</div>`; return; } el.list.innerHTML = filtered.map((item, index) => { const originalIndex = rawMaterials.indexOf(item); return ` <div class="card"> <div class="preview-top"> <div> <div class="name">${item.nama}</div> <div class="subCard">${item.kategori} - ${item.merk}</div> </div> <div style="font-weight:bold;">${rupiah(calcHargaPerUnit(item))} / ${item.unit}</div> </div> <div class="info"> <div class="box"> <div class="small">Supplier</div> <div class="big">${item.supplier}</div> </div> <div class="box"> <div class="small">Pembelian</div> <div class="big">${item.qty} ${item.buyUnit}</div> </div> <div class="box"> <div class="small">Konversi</div> <div class="big">${item.conversion} ${item.unit}</div> </div> <div class="box"> <div class="small">Waste</div> <div class="big">${item.waste}%</div> </div> <div class="box"> <div class="small">Status</div> <div class="big">ACTIVE</div> </div> </div> <div class="actions"> <button class="mini-btn edit" onclick="openEdit(${originalIndex})">Edit</button> <button class="mini-btn delete" onclick="deleteItem(${originalIndex})">Hapus</button> </div> </div> `; }).join("");
} function addItem(){ const data = readForm(); if(!data.nama){ alert("Isi Nama Bahan"); el.nama.focus(); return; } rawMaterials.unshift(data); persistRawMaterials(); clearForm(); render();
} function openEdit(index){ editIndex = index; const item = rawMaterials[index]; if(!item) return; el.eNama.value = item.nama; el.eMerk.value = item.merk; el.eKategori.value = item.kategori; el.eSupplier.value = item.supplier; el.eQty.value = item.qty; el.eBuyUnit.value = item.buyUnit; el.eHarga.value = item.harga; el.eConversion.value = item.conversion; el.eUnit.value = item.unit; el.eWaste.value = item.waste; el.modal.style.display = "flex";
} function closeModal(){ el.modal.style.display = "none";
} function saveEdit(){ if(editIndex === null) return; rawMaterials[editIndex] = { nama: titleCase(el.eNama.value), merk: titleCase(el.eMerk.value), kategori: el.eKategori.value, supplier: titleCase(el.eSupplier.value), qty: Number(el.eQty.value) || 0, buyUnit: el.eBuyUnit.value, harga: Number(numberOnly(el.eHarga.value)) || 0, conversion: Number(el.eConversion.value) || 0, unit: el.eUnit.value, waste: Number(el.eWaste.value) || 0 }; persistRawMaterials(); editIndex = null; closeModal(); render();
} function deleteItem(index){ if(!confirm("Hapus data bahan ini?")) return; rawMaterials.splice(index, 1); persistRawMaterials(); render();
} el.harga.addEventListener("input", () => { const n = numberOnly(el.harga.value); el.harga.value = n ? rupiah(n) : "";
}); el.eHarga.addEventListener("input", () => { const n = numberOnly(el.eHarga.value); el.eHarga.value = n ? rupiah(n) : "";
}); document.getElementById("tambahBtn").addEventListener("click", addItem);
el.search.addEventListener("input", render); el.modal.addEventListener("click", (e) => { if(e.target === el.modal) closeModal();
}); render();
</script> <script>
(function(){ const toggle = document.getElementById('menuToggle'); const sidebar = document.getElementById('biyaSidebar'); const overlay = document.getElementById('mobileOverlay'); if(!toggle || !sidebar || !overlay) return; const closeSidebar = () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); document.body.classList.remove('biya-no-scroll'); }; const openSidebar = () => { sidebar.classList.add('open'); overlay.classList.add('open'); document.body.classList.add('biya-no-scroll'); }; toggle.addEventListener('click', () => { if(sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); }); overlay.addEventListener('click', closeSidebar); window.addEventListener('resize', () => { if(window.innerWidth > 980) closeSidebar(); }); const style = document.createElement('style'); style.textContent = '.biya-no-scroll{overflow:hidden !important;}'; document.head.appendChild(style);
})();
</script> </body>
</html>
