<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>BIYA • Settings</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#07173a;font-family:Arial,sans-serif;color:#fff}
    .wrapper{display:flex;min-height:100vh}
    .sidebar{position:fixed;left:0;top:0;width:260px;height:100vh;background:#102766;padding:30px;overflow:auto}
    .logo{font-size:34px;font-weight:bold;margin-bottom:45px}
    .item{height:56px;padding:0 18px;display:flex;align-items:center;border-radius:16px;margin-bottom:12px;cursor:pointer;font-size:16px;transition:.22s;color:white}
    .item:hover{transform:translateX(6px);background:rgba(255,255,255,.06)}
    .item.active{background:#2563eb;transform:translateX(10px);box-shadow:0 10px 30px rgba(37,99,235,.35)}
    .btn{margin-top:18px;height:54px;width:100%;border:none;border-radius:14px;background:#2563eb;color:white;cursor:pointer;font-weight:bold}
    .main{margin-left:260px;width:calc(100% - 260px);padding:40px}
    .title{font-size:44px;margin-bottom:10px}
    .sub{opacity:.7;margin-bottom:30px}
    .section{background:#102766;padding:28px;border-radius:22px;margin-bottom:24px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    label{display:block;margin-bottom:10px;opacity:.7}
    input,select,textarea{width:100%;height:56px;padding:0 18px;background:#0d2158;border:none;border-radius:14px;color:white;outline:none}
    textarea{height:auto;min-height:120px;padding:16px 18px;resize:vertical}
    .btn-action{height:54px;padding:0 24px;border:none;border-radius:14px;background:#2563eb;color:white;cursor:pointer;font-weight:bold}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
    .summary-box{background:#0d2158;padding:20px;border-radius:16px}
    .summary-title{opacity:.6;margin-bottom:10px}
    .summary-value{font-size:24px;font-weight:bold;white-space:pre-line}
    .pill-note{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:999px;background:rgba(37,99,235,.18);color:#cfe0ff;font-size:12px}
    @media (max-width:980px){.sidebar{position:relative;width:100%;height:auto}.main{margin-left:0;width:100%}.grid{grid-template-columns:1fr}}
  </style>

<style id="biya-theme">
:root{
  --biya-bg:#04122B;
  --biya-sidebar:#081A3A;
  --biya-surface:#102B63;
  --biya-surface-hover:#163A87;
  --biya-primary:#0066FF;
  --biya-success:#00D66B;
  --biya-cyan:#2ED8FF;
  --biya-warning:#FFB800;
  --biya-danger:#FF4D4F;
  --biya-text:#FFFFFF;
  --biya-muted:#D7E3FF;
  --biya-border:rgba(255,255,255,0.08);
  --biya-card-shadow:0 8px 24px rgba(0,0,0,0.20);
  --biya-modal-shadow:0 20px 40px rgba(0,0,0,0.30);
  --biya-active-shadow:0 0 20px rgba(0,102,255,0.35);
  --biya-radius-card:16px;
  --biya-radius-btn:12px;
  --biya-radius-input:12px;
  --biya-radius-modal:20px;
}

html{
  scroll-behavior:smooth;
}

body{
  background:var(--biya-bg)!important;
  color:var(--biya-text)!important;
  font-family:Inter, "Segoe UI", Arial, sans-serif!important;
}

.wrapper{
  background:transparent!important;
}

.sidebar{
  background:linear-gradient(180deg, rgba(8,26,58,.98), rgba(4,18,43,.98))!important;
  border-right:1px solid var(--biya-border)!important;
  box-shadow:var(--biya-card-shadow)!important;
}

.logo{
  color:#fff!important;
  letter-spacing:.2px!important;
}

.logo small{
  display:block!important;
  margin-top:8px!important;
  font-size:12px!important;
  font-weight:400!important;
  opacity:.65!important;
  letter-spacing:1.6px!important;
}

.item{
  color:var(--biya-muted)!important;
  border:1px solid transparent!important;
  border-radius:16px!important;
}

.item:hover{
  background:var(--biya-surface-hover)!important;
  color:#fff!important;
  transform:translateX(6px)!important;
}

.item.active{
  background:linear-gradient(135deg, var(--biya-primary), var(--biya-success))!important;
  color:#fff!important;
  box-shadow:var(--biya-active-shadow)!important;
}

.btn,
.btn-action,
.save-btn,
.add-row-btn,
.action,
.loginBtn,
.primary-btn{
  background:linear-gradient(135deg, var(--biya-primary), var(--biya-success))!important;
  color:#fff!important;
  border:none!important;
  border-radius:var(--biya-radius-btn)!important;
  box-shadow:var(--biya-card-shadow)!important;
}

.btn.secondary,
.btn-action.red,
.action.alt,
.btn.alt{
  background:var(--biya-surface-hover)!important;
  color:#fff!important;
}

.section,
.card,
.summary-box,
.mini-box,
.detail-card,
.menu-item,
.prep-item,
.category-block,
.box,
.alert-item,
.insight-item,
.modalBox,
.section-card,
.panel{
  background:linear-gradient(180deg, rgba(16,43,99,.96), rgba(12,34,83,.98))!important;
  border:1px solid var(--biya-border)!important;
  border-radius:var(--biya-radius-card)!important;
  box-shadow:var(--biya-card-shadow)!important;
}

.modal{
  background:rgba(0,0,0,.56)!important;
}

.modalBox{
  border-radius:var(--biya-radius-modal)!important;
  box-shadow:var(--biya-modal-shadow)!important;
}

input,
select,
textarea,
.table-input,
.table-select,
.search-box input,
.chart-select,
input[type="file"]{
  background:rgba(16,43,99,.95)!important;
  border:1px solid var(--biya-border)!important;
  border-radius:var(--biya-radius-input)!important;
  color:#fff!important;
  outline:none!important;
}

input::placeholder,
textarea::placeholder{
  color:rgba(215,227,255,.5)!important;
}

th,
thead th{
  background:#163A87!important;
  color:#fff!important;
}

td,
tbody td{
  background:#102B63!important;
  color:#fff!important;
}

tbody tr:hover td{
  background:#163A87!important;
}

.summary-title,
.mini-title,
.card-sub,
.sub,
.small-note,
.notice,
.muted{
  color:rgba(215,227,255,.72)!important;
}

.pill,
.menu-badge,
.prep-category,
.status{
  border-radius:999px!important;
}

.pill.green,
.profit-green,
.ok{
  background:rgba(0,214,107,.18)!important;
  color:#96f5b7!important;
}

.pill.yellow,
.profit-yellow,
.warn{
  background:rgba(255,184,0,.18)!important;
  color:#ffe08a!important;
}

.pill.red,
.profit-red,
.danger{
  background:rgba(255,77,79,.18)!important;
  color:#ffb4b4!important;
}

.pill.gray{
  background:#163A87!important;
  color:#fff!important;
}

::-webkit-scrollbar{
  width:10px;
  height:10px;
}
::-webkit-scrollbar-thumb{
  background:#163A87;
  border-radius:999px;
}
::-webkit-scrollbar-track{
  background:transparent;
}

@media (max-width: 980px){
  .sidebar{
    position:relative!important;
    width:100%!important;
    height:auto!important;
  }

  .main{
    margin-left:0!important;
    width:100%!important;
  }

  .grid,
  .grid3,
  .summary,
  .summary-grid,
  .top-grid,
  .info,
  .detail-grid,
  .summary-callout{
    grid-template-columns:1fr!important;
  }

  .search-box,
  .filter-box{
    width:100%!important;
    max-width:100%!important;
  }

  .menu-cost,
  .preview-right,
  .prep-right{
    min-width:0!important;
    text-align:left!important;
  }

  .menu-header,
  .headerCard,
  .prep-header,
  .product-hero,
  .preview-top{
    flex-direction:column!important;
  }
}
</style>
</head>
<body>
<div class="wrapper">
<div class="sidebar">
<div class="logo">BIYA<small>BUSINESS IN YOUR HAND</small></div>
<div class="item" onclick="location.href='costdashboard.html'">📊 Dashboard</div>
<div class="item" onclick="location.href='rawmaterial.html'">📦 Raw Material</div>
<div class="item" onclick="location.href='preparation.html'">🥣 Preparation</div>
<div class="item" onclick="location.href='menu.html'">🍔 Menu</div>
<div class="item" onclick="location.href='producthpp.html'">📈 Product HPP</div>
<div class="item" onclick="location.href='exportcenter.html'">📄 Export Center</div>
<div class="item active">⚙ Settings</div>
<button class="btn" onclick="location.href='dashboard.html'">← Kembali</button>
</div>
<div class="main">
<div class="title">Settings</div>
<div class="sub">Atur identitas bisnis, target costing, dan preferensi sistem BIYA.</div>
<div class="section">
<div style="font-size:22px;font-weight:bold;margin-bottom:16px;">Business Profile</div>
<div class="grid">
<div><label>Business Name</label><input id="businessName" placeholder="Coffee XYZ"/></div>
<div><label>Business Type</label><input id="businessType" placeholder="Coffee Shop"/></div>
<div><label>Owner Name</label><input id="ownerName" placeholder="Nama Owner"/></div>
<div><label>Phone</label><input id="phone" placeholder="08xxxxxxxxxx"/></div>
<div><label>Email</label><input id="email" placeholder="owner@email.com"/></div>
<div><label>Logo URL</label><input id="logoUrl" placeholder="https://.../logo.png"/></div>
<div style="grid-column:1/-1;"><label>Address</label><textarea id="address" placeholder="Alamat bisnis"></textarea></div>
</div>
</div>
<div class="section">
<div style="font-size:22px;font-weight:bold;margin-bottom:16px;">Cost Settings</div>
<div class="grid">
<div><label>Food Cost Target %</label><input id="foodCostTarget" placeholder="35" type="number"/></div>
<div><label>Profit Target %</label><input id="profitTarget" placeholder="50" type="number"/></div>
<div><label>Currency</label><select id="currency"><option value="IDR">IDR</option><option value="USD">USD</option><option value="MYR">MYR</option></select></div>
<div><label>Date Format</label><select id="dateFormat"><option value="dd/mm/yyyy">DD/MM/YYYY</option><option value="yyyy-mm-dd">YYYY-MM-DD</option></select></div>
</div>
<div class="pill-note" style="margin-top:10px;">Dipakai di Dashboard, Product HPP, dan Export Center</div>
</div>
<div class="section">
<div style="font-size:22px;font-weight:bold;margin-bottom:16px;">System</div>
<div class="grid">
<div><label>Auto Capitalize</label><select id="autoCapitalize"><option value="on">ON</option><option value="off">OFF</option></select></div>
<div><label>Default Status</label><select id="defaultStatus"><option>ACTIVE</option><option>INACTIVE</option></select></div>
</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:24px;">
<button class="btn-action" id="saveBtn">Simpan Settings</button>
<button class="btn-action" id="resetBtn" style="background:#334155">Reset</button>
</div>
</div>
<div class="section">
<div style="font-size:22px;font-weight:bold;margin-bottom:16px;">Current Summary</div>
<div class="summary-grid" id="summaryGrid"></div>
</div>
</div>
</div>
<script>
const KEY = "biya_settings";
const defaults = {
  businessName: "BIYA Cost Management",
  businessType: "F&B",
  ownerName: "",
  phone: "",
  email: "",
  address: "",
  logoUrl: "",
  foodCostTarget: 35,
  profitTarget: 50,
  currency: "IDR",
  dateFormat: "dd/mm/yyyy",
  autoCapitalize: "on",
  defaultStatus: "ACTIVE"
};

function loadSettings(){
  try{
    return Object.assign({}, defaults, JSON.parse(localStorage.getItem(KEY) || "{}"));
  }catch(e){
    return {...defaults};
  }
}
function saveSettings(s){
  localStorage.setItem(KEY, JSON.stringify(s));
}
function fill(){
  const s = loadSettings();
  businessName.value = s.businessName;
  businessType.value = s.businessType;
  ownerName.value = s.ownerName;
  phone.value = s.phone;
  email.value = s.email;
  address.value = s.address;
  logoUrl.value = s.logoUrl;
  foodCostTarget.value = s.foodCostTarget;
  profitTarget.value = s.profitTarget;
  currency.value = s.currency;
  dateFormat.value = s.dateFormat;
  autoCapitalize.value = s.autoCapitalize;
  defaultStatus.value = s.defaultStatus;

  const summary = [
    ["Business", s.businessName],
    ["Type", s.businessType],
    ["Food Cost Target", s.foodCostTarget + "%"],
    ["Profit Target", s.profitTarget + "%"],
    ["Currency", s.currency],
    ["Auto Capitalize", s.autoCapitalize.toUpperCase()]
  ];
  summaryGrid.innerHTML = summary.map(([k,v])=>`<div class="summary-box"><div class="summary-title">${k}</div><div class="summary-value">${v}</div></div>`).join("");
}

saveBtn.onclick = () => {
  const s = {
    businessName: businessName.value.trim() || defaults.businessName,
    businessType: businessType.value.trim(),
    ownerName: ownerName.value.trim(),
    phone: phone.value.trim(),
    email: email.value.trim(),
    address: address.value.trim(),
    logoUrl: logoUrl.value.trim(),
    foodCostTarget: Number(foodCostTarget.value) || defaults.foodCostTarget,
    profitTarget: Number(profitTarget.value) || defaults.profitTarget,
    currency: currency.value,
    dateFormat: dateFormat.value,
    autoCapitalize: autoCapitalize.value,
    defaultStatus: defaultStatus.value
  };
  saveSettings(s);
  fill();
  alert("Settings tersimpan");
};
resetBtn.onclick = () => {
  localStorage.removeItem(KEY);
  fill();
  alert("Settings direset");
};
fill();
</script>
</body>
</html>
