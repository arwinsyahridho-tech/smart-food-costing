<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BIYA Raw Material</title>

<style>
.modal{

display:none;

position:fixed;

top:0;

left:0;

right:0;

bottom:0;

background:rgba(0,0,0,.65);

z-index:999;

justify-content:center;

align-items:center;

}

.modalBox{

width:900px;

max-width:95%;

background:#102766;

padding:30px;

border-radius:22px;

max-height:90vh;

overflow:auto;

}
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07173a;
font-family:Arial;
color:white;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{

position:fixed;

left:0;

top:0;

width:260px;

height:100vh;

background:#102766;

padding:30px;

overflow:auto;

}

.logo{

font-size:34px;

font-weight:bold;

margin-bottom:45px;

}
.item{

height:56px;

padding:0 18px;

display:flex;

align-items:center;

border-radius:16px;

margin-bottom:12px;

cursor:pointer;

font-size:16px;

transition:.22s;

color:white;

}


.item:hover:not(.active){

transform:
translateX(6px);

background:
rgba(
255,
255,
255,
.06
);

}


.item.active{

background:#2563eb;

transform:
translateX(10px);

box-shadow:

0 10px 18px

rgba(
37,
99,
235,
.22
);

}
.item:hover{

background:#1a3d95;

}

.logout{

margin-top:40px;

}

.main{

margin-left:260px;

width:

calc(
100% - 260px
);

padding:40px;

}

.title{

font-size:44px;

margin-bottom:25px;

}

.section{

background:#102766;

padding:28px;

border-radius:22px;

margin-bottom:24px;

}

.sectionTitle{

font-size:20px;

margin-bottom:20px;

opacity:.9;

}

.grid{

display:grid;

grid-template-columns:

1fr 1fr;

gap:18px;

}

.grid3{

display:grid;

grid-template-columns:

1fr 1fr 1fr;

gap:18px;

}

.field{

display:flex;

flex-direction:column;

gap:10px;

}

label{

font-size:14px;

opacity:.7;

}

input,
select{

height:56px;

padding:0 18px;

background:#0d2158;

border:none;

border-radius:14px;

color:white;

font-size:16px;

}

.btn{

margin-top:25px;

height:54px;

padding:0 24px;

width:100%;

border:none;

border-radius:14px;

background:#2563eb;

color:white;

font-size:16px;

cursor:pointer;

}

.search{

margin:30px 0;

}

.search input{

width:100%;

}

.card{

background:#102766;

padding:25px;

border-radius:22px;

}

.headerCard{

display:flex;

justify-content:space-between;

}

.name{

font-size:26px;

font-weight:bold;

}

.sub{

opacity:.6;

margin-top:8px;

}

.info{

display:grid;

grid-template-columns:

repeat(5,1fr);

gap:16px;

margin-top:25px;

}

.box{

background:#0d2158;

padding:18px;

border-radius:14px;

}

.small{

font-size:12px;

opacity:.6;

}

.big{

margin-top:10px;

font-size:18px;

}

@media(max-width:900px){

.sidebar{
display:none;
}

.grid,
.grid3,
.info{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ BIYA

</div>


<div
class="item"

onclick="
location.href=
'costdashboard.html'
"
>

🏠 Dashboard

</div>


<div
class="item active"
>

📦 Raw Material

</div>


<div
class="item"

onclick="
location.href=
'preparation.html'
"
>

🥣 Preparation

</div>


<div 
class="item"

onclick="
location.href=
'menu.html'
"
>

🍔 Menu

</div>

<div class="item" onclick="location.href='producthpp.html'">📈 Product HPP</div>


<div class="logout">

<button
class="btn"

onclick="
location.href=
'dashboard.html'
"

>

← Kembali

</button>

</div>

</div>



<div class="main">

<div class="title">

Raw Material Master

</div>



<!-- IDENTITAS -->

<div class="section">

<div class="sectionTitle">

IDENTITAS BAHAN

</div>

<div class="grid">

<div class="field">

<label>Nama Bahan</label>

<input
placeholder="Tepung Terigu Pro Sedang"
>

</div>

<div class="field">

<label>Merk</label>

<input
placeholder="Segitiga Biru"
>

</div>

<div class="field">

<label>Category</label>

<select>

<option>Bahan Kering</option>

<option>Bahan Basah</option>

<option>Buah</option>

<option>Packaging</option>

</select>

</div>

<div class="field">

<label>Supplier</label>

<input
placeholder="Toko A"
>

</div>

</div>

</div>



<!-- PEMBELIAN -->

<div class="section">

<div class="sectionTitle">

PEMBELIAN

</div>

<div class="grid3">

<div class="field">

<label>Qty Beli</label>

<input value="1">

</div>

<div class="field">

<label>Buy Unit</label>

<select>

<option>Kg</option>

<option>Pack</option>

<option>Liter</option>

<option>Pcs</option>

</select>

</div>

<div class="field">

<label>Harga Beli</label>

<input
id="hargaInput"
placeholder="Rp 0"
inputmode="numeric"
>
</div>

</div>

</div>



<!-- KONVERSI -->

<div class="section">

<div class="sectionTitle">

KONVERSI

</div>

<div class="grid3">

<div class="field">

<label>Conversion Qty</label>

<input
placeholder="1000"
>

</div>

<div class="field">

<label>Unit Dasar</label>

<select>

<option>gr</option>

<option>ml</option>

<option>pcs</option>

</select>

</div>

<div class="field">

<label>Default Waste %</label>

<input value="5">

</div>

</div>

<div
style="
display:flex;
gap:12px;
margin-top:25px;
"
>

<button
id="tambahBtn"
class="btn"
style="margin:0"
>

+ Tambah Bahan

</button>



</button>

</div>
</div>



<!-- SEARCH -->

<div class="search">

<input
placeholder="Cari bahan..."
>

</div>



<!-- CARD -->

<div
class="card"
id="previewCard"
>

<div class="headerCard">

<div>

<div class="name">

Tepung Terigu

</div>

<div class="sub">

Bahan Kering • Segitiga Biru

</div>

</div>

<div>

Rp 13 / gr

</div>

</div>


<div class="info">

<div class="box">

<div class="small">

Supplier

</div>

<div class="big">

Sari Murni

</div>

</div>


<div class="box">

<div class="small">

Pembelian

</div>

<div class="big">

1 Pack

</div>

</div>


<div class="box">

<div class="small">

Konversi

</div>

<div class="big">

1000 gr

</div>

</div>


<div class="box">

<div class="small">

Waste

</div>

<div class="big">

5%

</div>

</div>


<div class="box">

<div class="small">

Status

</div>

<div class="big">

ACTIVE


</div>
</div>

</div>

</div>

</div>

</div>
  <script>

let bahan=[];

let editIndex=null;

const input=
document.querySelectorAll("input");

const select=
document.querySelectorAll("select");

const search=
document.querySelector(".search input");

const area=
document.getElementById(
"previewCard"
);

function kapitalAwal(teks){

return teks

.toLowerCase()

.replace(

/\b\w/g,

huruf=>

huruf.toUpperCase()

);

}

function ambilData(){

return{

nama:
kapitalAwal(
input[0]
.value
.trim()
),

merk:
kapitalAwal(
input[1]
.value
.trim()
),

supplier:
kapitalAwal(
input[2]
.value
.trim()
),
qty:input[3].value,

buyUnit:select[1].value,

harga:Number(input[4].value),

conversion:Number(input[5].value),

unit:select[2].value,

waste:input[6].value

};

}



function isiForm(x){

input[0].value=x.nama;

input[1].value=x.merk;

select[0].value=x.kategori;

input[2].value=x.supplier;

input[3].value=x.qty;

select[1].value=x.buyUnit;

input[4].value=x.harga;

input[5].value=x.conversion;

select[2].value=x.unit;

input[6].value=x.waste;

}



function kosongkan(){

input[0].value="";

input[1].value="";

input[2].value="";

input[4].value="";

input[5].value="";

}



function render(){

area.innerHTML="";

let keyword=
search.value
.toLowerCase();

bahan

.forEach(

(item,index)=>{

if(

keyword &&

!item.nama
.toLowerCase()
.includes(
keyword
)

){

return;

}

const harga=

item.conversion

?

(

item.harga
/
item.conversion

).toFixed(2)

:

0;


area.innerHTML+=`

<div
class="card"
style="
margin-bottom:20px;
"
>

<div class="headerCard">

<div>

<div class="name">

${item.nama}

</div>

<div class="sub">

${item.kategori}
•
${item.merk}

</div>

</div>

<div>

Rp ${harga}
/ ${item.unit}

</div>

</div>


<div class="info">

<div class="box">

<div class="small">

Supplier

</div>

<div class="big">

${item.supplier}

</div>

</div>


<div class="box">

<div class="small">

Pembelian

</div>

<div class="big">

${item.qty}
${item.buyUnit}

</div>

</div>


<div class="box">

<div class="small">

Konversi

</div>

<div class="big">

${item.conversion}
${item.unit}

</div>

</div>


<div class="box">

<div class="small">

Waste

</div>

<div class="big">

${item.waste}%

</div>

</div>


<div class="box">

<button
class="btn"
style="
margin:0;
height:44px;
background:#f59e0b;
width:100%;
"
onclick="editData(${index})"
>

Edit

</button>

<br><br>

<button
class="btn"
style="
margin:0;
height:44px;
background:#d62828;
width:100%;
"
onclick="hapusData(${index})"
>

Hapus

</button>

</div>

</div>

</div>

`;

}

);

}


function tambahData(){

const data=
ambilData();

if(
!data.nama
){

alert(
"Isi Nama Bahan"
);

return;

}

bahan.push(
data
);

kosongkan();

render();

}



function editData(i){

editIndex=i;

let x=bahan[i];

eNama.value=x.nama;
eMerk.value=x.merk;
eKategori.value=x.kategori;
eSupplier.value=x.supplier;

eQty.value=x.qty;
eBuyUnit.value=x.buyUnit;

eHarga.value=x.harga;

eConversion.value=x.conversion;

eUnit.value=x.unit;

eWaste.value=x.waste;

document
.getElementById(
"editModal"
)

.style.display=
"flex";

}


function tutupModal(){

document
.getElementById(
"editModal"
)

.style.display=
"none";

}


function simpanEdit(){

bahan[editIndex]={

nama:eNama.value,

merk:eMerk.value,

kategori:eKategori.value,

supplier:eSupplier.value,

qty:eQty.value,

buyUnit:eBuyUnit.value,

harga:Number(
eHarga.value
),

conversion:Number(
eConversion.value
),

unit:eUnit.value,

waste:eWaste.value

};

render();

tutupModal();

}

function updateData(){

if(
editIndex===null
){

alert(
"Pilih Edit dulu"
);

return;

}

bahan[editIndex]=
ambilData();

render();

}



function hapusData(i){

bahan.splice(
i,
1
);

render();

}



document
.getElementById(
"tambahBtn"
)

.addEventListener(
"click",
tambahData
);






search
.addEventListener(
"input",
render
);



render();
</script>
  <div id="editModal" class="modal">

<div class="modalBox">

<h2>Edit Bahan</h2>

<div class="grid">

<div class="field">
<label>Nama</label>
<input id="eNama">
</div>

<div class="field">
<label>Merk</label>
<input id="eMerk">
</div>

<div class="field">
<label>Kategori</label>

<select id="eKategori">
<option>Bahan Kering</option>
<option>Bahan Basah</option>
<option>Buah</option>
<option>Packaging</option>
</select>

</div>

<div class="field">
<label>Supplier</label>
<input id="eSupplier">
</div>

<div class="field">
<label>Qty</label>
<input id="eQty">
</div>

<div class="field">
<label>Buy Unit</label>

<select id="eBuyUnit">
<option>Kg</option>
<option>Pack</option>
<option>Liter</option>
<option>Pcs</option>
</select>

</div>

<div class="field">
<label>Harga</label>
<input id="eHarga">
</div>

<div class="field">
<label>Konversi</label>
<input id="eConversion">
</div>

<div class="field">
<label>Unit</label>

<select id="eUnit">
<option>gr</option>
<option>ml</option>
<option>pcs</option>
</select>

</div>

<div class="field">
<label>Waste</label>
<input id="eWaste">
</div>

</div>

<div style="display:flex;gap:10px;margin-top:20px">

<button
class="btn"
onclick="simpanEdit()"
>
Simpan
</button>

<button
class="btn"
style="background:#d62828"
onclick="tutupModal()"
>
Batal
</button>

</div>

</div>

</div>

</body>
</body>

</html>
