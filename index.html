<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Smart Food Costing
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#07173a;

font-family:Arial;

color:white;

}

.box{

text-align:center;

}

button{

padding:14px 28px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

}

.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.6);

justify-content:center;

align-items:center;

z-index:9999;

}

.card{

background:white;

color:black;

padding:30px;

border-radius:20px;

width:340px;

}

input{

width:100%;

padding:12px;

margin-top:12px;

}

.loginBtn{

width:100%;

margin-top:15px;

}

.sidebar{

width:260px;

background:#0f2559;

padding:20px;

height:100vh;

}

.content{

padding:40px;

flex:1;

}

</style>

</head>

<body>

<div class="box">

<h1>

🍽️ SMART FOOD COSTING

</h1>

<br>

<p>

Phase 1 Development

</p>

<br>

<button
id="openBtn"
>

Login

</button>

</div>


<div
id="modal"
class="modal"
>

<div class="card">

<h2>

Login

</h2>

<br>

<input
placeholder="Email"
>

<input
type="password"
placeholder="Password"
>

<button
id="loginBtn"
class="loginBtn"
>

Masuk

</button>

<button
id="closeBtn"
class="loginBtn"
>

Tutup

</button>

</div>

</div>


<script>

const modal =
document
.getElementById(
"modal"
);

document
.getElementById(
"openBtn"
)

.onclick
=
()=>{

modal.style.display=
"flex";

};


document
.getElementById(
"closeBtn"
)

.onclick
=
()=>{

modal.style.display=
"none";

};


document
.getElementById(
"loginBtn"
)

.onclick
=
()=>{

document.body.innerHTML=

`

<div
style="
display:flex;
background:#07173a;
color:white;
height:100vh;
font-family:Arial;
"
>

<div
class="sidebar"
>

<h2>

🍽️ SFC

</h2>

<br><br>

🏠 Dashboard

<br><br>

📦 Raw Material

<br><br>

🔒 Preparation

<br><br>

🔒 Recipe

<br><br>

🔒 Menu

<br><br>

🔒 HPP

</div>


<div
class="content"
>

<h1>

Dashboard

</h1>

<br>

<p>

Selamat datang 🚀

</p>

<br>

<div
style="
background:#0f2559;
padding:20px;
border-radius:20px;
"
>

Total Raw Material

<br><br>

0

</div>

</div>

</div>

`;

};

</script>

</body>

</html>
