<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Food Costing</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#07183d;
font-family:Arial,sans-serif;
color:white;
}

.box{
text-align:center;
}

h1{
font-size:54px;
margin-bottom:16px;
}

p{
font-size:20px;
margin-bottom:30px;
opacity:.9;
}

button{
padding:14px 36px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.card{
background:white;
color:#111;
padding:30px;
border-radius:16px;
width:320px;
text-align:center;
}

.card h2{
margin-bottom:10px;
}

.card p{
color:#666;
font-size:14px;
margin-bottom:20px;
}

.card button{
width:100%;
}
</style>
</head>

<body>

<div class="box">
<h1>🍽️ SMART FOOD COSTING</h1>
<p>Phase 1 Development</p>

<button onclick="openLogin()">
Login
</button>
</div>

<div class="popup" id="loginPopup">
<div class="card">

<h2>Login</h2>

<p>
Login Supabase akan dibuat di Phase 2 🚀
</p>

<button onclick="closeLogin()">
Tutup
</button>

</div>
</div>

<script>

function openLogin(){
document
.getElementById("loginPopup")
.style.display="flex";
}

function closeLogin(){
document
.getElementById("loginPopup")
.style.display="none";
}

</script>

</body>
</html>
