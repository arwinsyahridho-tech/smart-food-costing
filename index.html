<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Food Costing</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
height:100vh;
background:#07173a;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}

.box{
text-align:center;
}

button{
padding:14px 28px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
}

.card{
background:white;
color:black;
padding:30px;
border-radius:20px;
width:320px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
}

.loginBtn{
margin-top:15px;
width:100%;
}

</style>
</head>

<body>

<div class="box">
<h1>🍽️ SMART FOOD COSTING</h1>
<p>Phase 1 Development</p>

<button onclick="openLogin()">
Login
</button>
</div>

<div class="modal" id="modal">

<div class="card">

<h2>Login</h2>

<input id="email" placeholder="Email">

<input
id="password"
type="password"
placeholder="Password"
>

<button
class="loginBtn"
onclick="login()"
>
Masuk
</button>

<br><br>

<button
class="loginBtn"
onclick="closeLogin()"
>
Tutup
</button>

</div>

</div>

<script>

/*
GANTI DUA BARIS INI
*/

const SUPABASE_URL =
https://pkjmkjyylgzjvhcreucc.supabase.co/rest/v1/;

const SUPABASE_KEY =
sb_publishable_Tq4d0o3PIAd_zh11uJa2uQ_M_zPIYFX;

const supabase=
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

function openLogin(){
document.getElementById("modal").style.display="flex";
}

function closeLogin(){
document.getElementById("modal").style.display="none";
}

async function login(){

const email=
document.getElementById("email").value;

const password=
document.getElementById("password").value;

const {error}=await supabase.auth.signInWithPassword({
email,
password
});

if(error){

alert(error.message);

}else{

alert("Login berhasil 🚀");

}

}

</script>

</body>
</html>
