<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Smart Food Costing</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#07173a;
font-family:Arial;
color:white;
}

.box{
text-align:center;
}

h1{
margin-bottom:10px;
}

p{
margin-bottom:24px;
opacity:.8;
}

button{

padding:14px 28px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

font-size:16px;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

}

.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.5);

justify-content:center;

align-items:center;

}

.card{

background:white;

color:black;

padding:30px;

border-radius:20px;

width:340px;

}

input{

width:100%;

padding:12px;

margin-top:12px;

border-radius:10px;

border:1px solid #ddd;

}

.loginBtn{

width:100%;

margin-top:14px;

}

.loading{

opacity:.7;

pointer-events:none;

}

</style>

</head>

<body>

<div class="box">

<h1>
🍽️ SMART FOOD COSTING
</h1>

<p>
Phase 1 Development
</p>

<button onclick="openLogin()">
Login
</button>

</div>


<div
class="modal"
id="modal"
>

<div class="card">

<h2>Login</h2>

<input
id="email"
type="email"
placeholder="Email"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button
id="loginBtn"
class="loginBtn"
onclick="login()"
>

Masuk

</button>

<button
class="loginBtn"
onclick="closeLogin()"
>

Tutup

</button>

</div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL =
"https://pkjmkjyylgzjvhcreucc.supabase.co";

const SUPABASE_KEY =
"sb_publishable_Tq4d0o3PIAd_zh11uJa2uQ_M_zPIYFX";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);


/* AUTO LOGIN */

(async()=>{

const {

data

}

=

await

supabase
.auth
.getSession();

if(
data.session
){

window.location.replace(
"./dashboard.html"
);

}

})();


function openLogin(){

document
.getElementById(
"modal"
)
.style
.display
=
"flex";

}


function closeLogin(){

document
.getElementById(
"modal"
)
.style
.display
=
"none";

}


async function login(){

const btn =
document.getElementById(
"loginBtn"
);

try{

const email =
document
.getElementById(
"email"
)
.value
.trim();

const password =
document
.getElementById(
"password"
)
.value;

if(
!email||
!password
){

alert(
"Isi email & password"
);

return;

}

btn.innerText=
"Loading...";

btn.classList.add(
"loading"
);

const {

error

}

=

await

supabase
.auth
.signInWithPassword({

email,

password

});


if(error){

alert(
error.message
);

btn.innerText=
"Masuk";

btn.classList.remove(
"loading"
);

return;

}


window.location.replace(
"./dashboard.html"
);

}catch(e){

alert(
e.message
);

btn.innerText=
"Masuk";

btn.classList.remove(
"loading"
);

}

}

</script>

</body>

</html>
