name: Fix mobile sidebar navigation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch sidebar handlers
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              'modules/cost-management/costdashboard.html',
              'modules/cost-management/rawmaterial.html',
              'modules/cost-management/preparation.html',
              'modules/cost-management/menu.html',
              'modules/cost-management/producthpp.html',
              'modules/cost-management/exportcenter.html',
              'modules/cost-management/settings.html',
          ]

          handler = """<script>
          (function(){ const toggle = document.getElementById('menuToggle'); const sidebar = document.getElementById('biyaSidebar'); const overlay = document.getElementById('mobileOverlay'); if(!toggle || !sidebar || !overlay) return; const mobileQuery = window.matchMedia('(max-width: 980px)'); let closeButton = sidebar.querySelector('.sidebar-close'); if(!closeButton){ closeButton = document.createElement('button'); closeButton.className = 'sidebar-close'; closeButton.type = 'button'; closeButton.setAttribute('aria-label', 'Tutup menu'); closeButton.innerHTML = '&times;'; sidebar.prepend(closeButton); } const style = document.createElement('style'); style.textContent = '.biya-no-scroll{overflow:hidden !important;}.sidebar-close{display:none;}@media (max-width:980px){.sidebar-close{display:flex;align-items:center;justify-content:center;width:42px;height:42px;margin:0 0 18px auto;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(255,255,255,.08);color:#fff;font-size:28px;line-height:1;cursor:pointer;}}'; document.head.appendChild(style); toggle.setAttribute('aria-controls','biyaSidebar'); toggle.setAttribute('aria-expanded','false'); const closeSidebar = () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); document.body.classList.remove('biya-no-scroll'); toggle.setAttribute('aria-expanded','false'); sidebar.setAttribute('aria-hidden', mobileQuery.matches ? 'true' : 'false'); overlay.setAttribute('aria-hidden','true'); }; const openSidebar = () => { sidebar.classList.add('open'); overlay.classList.add('open'); document.body.classList.add('biya-no-scroll'); toggle.setAttribute('aria-expanded','true'); sidebar.setAttribute('aria-hidden','false'); overlay.setAttribute('aria-hidden','false'); }; toggle.addEventListener('click', () => { if(sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); }); closeButton.addEventListener('click', closeSidebar); overlay.addEventListener('click', closeSidebar); sidebar.addEventListener('click', (event) => { if(!mobileQuery.matches) return; if(event.target.closest('a, .item, .btn')) closeSidebar(); }); document.addEventListener('keydown', (event) => { if(event.key === 'Escape') closeSidebar(); }); const syncLayout = () => { if(mobileQuery.matches){ sidebar.setAttribute('aria-hidden', sidebar.classList.contains('open') ? 'false' : 'true'); } else { closeSidebar(); sidebar.setAttribute('aria-hidden','false'); } }; mobileQuery.addEventListener ? mobileQuery.addEventListener('change', syncLayout) : mobileQuery.addListener(syncLayout); syncLayout();
          })();
          </script>"""

          pattern = re.compile(r"<script>\s*\(function\(\)\{ const toggle = document\.getElementById\('menuToggle'\);.*?syncLayout\(\);\s*\}\)\(\);\s*</script>", re.S)
          changed = []

          for file_name in files:
              path = Path(file_name)
              text = path.read_text(encoding='utf-8')
              if 'id="menuToggle"' not in text or 'id="biyaSidebar"' not in text or 'id="mobileOverlay"' not in text:
                  continue
              new_text, count = pattern.subn(handler, text)
              if count == 0 and 'sidebar-close' not in text:
                  new_text = text.replace('</body>', handler + ' </body>')
              if new_text != text:
                  path.write_text(new_text, encoding='utf-8')
                  changed.append(file_name)

          print('\n'.join(changed) if changed else 'No HTML changes needed')
          PY
      - name: Commit patched files and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-mobile-sidebar.yml
          git add modules/cost-management/*.html
          git diff --cached --quiet || git commit -m "Fix mobile sidebar navigation"
          git push
