<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1"
>

<title>
SFC • Preparation
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07173a;
font-family:Arial;
color:white;
}

.wrapper{
display:flex;
}

.sidebar{

position:fixed;

left:0;

top:0;

width:260px;

height:100vh;

background:#102766;

padding:30px;

}

.logo{

font-size:34px;

font-weight:bold;

margin-bottom:45px;

}

.item{

height:56px;

padding:0 18px;

display:flex;

align-items:center;

border-radius:16px;

margin-bottom:12px;

cursor:pointer;

transition:.22s;

}

.item:hover:not(.active){

transform:
translateX(6px);

background:
rgba(
255,
255,
255,
.06
);

}

.item.active{

background:#2563eb;

transform:
translateX(10px);

box-shadow:

0 10px 18px

rgba(
37,
99,
235,
.22
);

}

.btn{

margin-top:40px;

height:54px;

width:100%;

border:none;

border-radius:14px;

background:#2563eb;

color:white;

cursor:pointer;

}

.main{

margin-left:260px;

width:calc(100% - 260px);

padding:40px;

}

.title{

font-size:44px;

margin-bottom:10px;

}

.sub{

opacity:.7;

margin-bottom:35px;

}

.grid{

display:grid;

grid-template-columns:

1fr 1fr;

gap:20px;

}

.section{

background:#102766;

padding:28px;

border-radius:22px;

margin-bottom:24px;

}

label{

display:block;

margin-bottom:10px;

opacity:.7;

}

input,
select{

width:100%;

height:56px;

padding:0 18px;

background:#0d2158;

border:none;

border-radius:14px;

color:white;

}

.card{

background:#102766;

padding:25px;

border-radius:22px;

margin-top:20px;

}

.big{

font-size:28px;

font-weight:bold;

}

.small{

opacity:.6;

margin-bottom:8px;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">
🍽️ SFC
</div>

<div
class="item"

onclick="
location.href=
'costdashboard.html'
"
>
📊 Dashboard
</div>

<div
class="item"

onclick="
location.href=
'rawmaterial.html'
"
>
📦 Raw Material
</div>

<div
class="item active"
>
🥣 Preparation
</div>

<div class="item">
🔒 Recipe
</div>

<div class="item">
🔒 Menu
</div>

<div class="item">
🔒 HPP
</div>

<button
class="btn"

onclick="
location.href=
'dashboard.html'
"
>

← Kembali

</button>

</div>



<div class="main">

<div class="title">

Preparation

</div>

<div class="sub">

Produk setengah jadi sebelum masuk Recipe

</div>



<div class="section">

<div class="grid">

<div>

<label>Nama Preparation</label>

<input
placeholder=
"Saus Coklat"
>

</div>

<div>

<label>Status</label>

<select>

<option>ACTIVE</option>

<option>INACTIVE</option>

</select>

</div>

<div>

<label>Yield Qty</label>

<input
placeholder=
"1000"
>

</div>

<div>

<label>Yield Unit</label>

<select>

<option>gr</option>

<option>ml</option>

<option>pcs</option>

</select>

</div>

<div>

<label>Waste %</label>

<input
value="5"
>

</div>

<div>

<label>Total Cost</label>

<input
placeholder=
"Auto"
disabled
>

</div>

</div>

<button
class="btn"
style="
margin-top:25px
"
>

+ Buat Preparation

</button>

</div>



<div class="card">

<div class="small">

Total Preparation

</div>

<div class="big">

0

</div>

</div>



<div class="card">

<div class="small">

Preview

</div>

<br>

Belum ada data preparation

</div>

</div>

</div>

</body>

</html>
