<script>

const tombol=
document.querySelector(".btn");

if(tombol){

tombol.onclick=
tambahBahan;

}

function tambahBahan(){

const input=
document.querySelectorAll("input");

const select=
document.querySelectorAll("select");


const nama=
input[0].value;

const merk=
input[1].value;

const kategori=
select[0].value;

const supplier=
input[2].value;

const qty=
input[3].value;

const buyUnit=
select[1].value;

const harga=
input[4].value;

const conversion=
input[5].value;

const unit=
select[2].value;

const waste=
input[6].value;



if(
!nama||
!harga||
!conversion
){

alert(
"Lengkapi data dulu"
);

return;

}



const hargaUnit=

(
Number(harga)
/
Number(conversion)
)

.toFixed(2);



document
.querySelector(
".card"
)

.innerHTML

=

`

<div class="headerCard">

<div>

<div class="name">

${nama}

</div>

<div class="sub">

${kategori}
•
${merk}

</div>

</div>

<div>

Rp ${hargaUnit}
/ ${unit}

</div>

</div>


<div class="info">

<div class="box">

<div class="small">

Supplier

</div>

<div class="big">

${supplier}

</div>

</div>


<div class="box">

<div class="small">

Pembelian

</div>

<div class="big">

${qty}
${buyUnit}

</div>

</div>


<div class="box">

<div class="small">

Konversi

</div>

<div class="big">

${conversion}
${unit}

</div>

</div>


<div class="box">

<div class="small">

Waste

</div>

<div class="big">

${waste}%

</div>

</div>


<div class="box">

<div class="small">

Status

</div>

<div class="big">

ACTIVE

</div>

</div>

</div>

`;



alert(
"Bahan berhasil ditambah 🚀"
);



input[0].value="";
input[1].value="";
input[2].value="";
input[4].value="";
input[5].value="";

}

</script>
