<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1"
>

<title>
SFC Dashboard
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#07173a;

font-family:Arial;

color:white;

}

.wrapper{

padding:40px;

max-width:1400px;

margin:auto;

}

.logo{

font-size:44px;

font-weight:bold;

margin-bottom:10px;

}

.subtitle{

opacity:.7;

margin-bottom:40px;

}

.grid{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(
280px,
1fr
)

);

gap:24px;

}

.card{

background:#102766;

border-radius:24px;

padding:30px;

cursor:pointer;

transition:.25s;

}

.card:hover{

transform:
translateY(-6px);

background:#183a92;

}

.icon{

font-size:50px;

margin-bottom:20px;

}

.title{

font-size:26px;

margin-bottom:10px;

}

.desc{

opacity:.7;

line-height:1.6;

}

.lock{

opacity:.45;

cursor:not-allowed;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:40px;

}

.btn{

height:54px;

padding:0 28px;

border:none;

border-radius:14px;

background:#2563eb;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="wrapper">

<div>

>

</div>

</div>

supplier,
konversi,

</div>

</div>

<div class="title">

</div>
