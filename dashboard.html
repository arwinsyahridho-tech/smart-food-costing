<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SFC Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07173a;
font-family:Arial;
color:white;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{
width:290px;
background:#102766;
padding:30px;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:40px;
}

.item{
padding:14px;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
}

.item:hover{
background:#1b3d91;
}

.main{
flex:1;
padding:40px;
overflow:auto;
}

.btn{
padding:10px 18px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.card{
background:#12286b;
padding:24px;
border-radius:20px;
width:280px;
margin-top:20px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
padding:14px;
background:#12286b;
font-size:14px;
}

td{
padding:12px;
border-bottom:1px solid #173680;
}

input,
select{
width:100%;
padding:10px;
background:#0f2559;
border:none;
color:white;
border-radius:8px;
}

.logout{
margin-top:40px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div
class="item"
onclick="dashboard()"
>

🏠 Dashboard

</div>

<div
class="item"
onclick="rawMaterial()"
>

📦 Raw Material

</div>

<div class="item">
🔒 Preparation
</div>

<div class="item">
🔒 Recipe
</div>

<div class="item">
🔒 Menu
</div>

<div class="item">
🔒 HPP
</div>

<div class="logout">

<button
class="btn"
onclick="logout()"
>

Logout

</button>

</div>

</div>



<div
class="main"
id="app"
>

</div>

</div>


<script>

let raw=[];

const app=
document.getElementById(
"app"
);



function dashboard(){

app.innerHTML=`

<h1>

Dashboard

</h1>

<div class="card">

Total Raw Material

<br><br>

<h1>

${raw.length}

</h1>

</div>

`;

}



function rawMaterial(){

let rows="";

raw.forEach((r,i)=>{

rows+=`

<tr>

<td>${r.id}</td>

<td>${r.nama}</td>

<td>${r.supplier}</td>

<td>${r.buyQty}</td>

<td>${r.buyUnit}</td>

<td>${r.convQty}</td>

<td>${r.useUnit}</td>

<td>Rp ${r.price}</td>

<td>Rp ${r.cost}</td>

<td>

<button
class="btn"
onclick="hapus(${i})"
>

X

</button>

</td>

</tr>

`;

});


app.innerHTML=`

<h1>

Raw Material Master

</h1>

<table>

<tr>

<th>ID</th>

<th>Nama</th>

<th>Supplier</th>

<th>Buy Qty</th>

<th>Buy Unit</th>

<th>Conv Qty</th>

<th>Usage Unit</th>

<th>Price</th>

<th>Cost/U</th>

<th></th>

</tr>

${rows}

<tr>

<td>AUTO</td>

<td>

<input id="nama">

</td>

<td>

<input id="supplier">

</td>

<td>

<input id="buy">

</td>

<td>

<select id="buyunit">

<option>Kg</option>

<option>Liter</option>

<option>Pack</option>

</select>

</td>

<td>

<input id="conv">

</td>

<td>

<select id="use">

<option>gr</option>

<option>ml</option>

<option>pcs</option>

</select>

</td>

<td>

<input id="price">

</td>

<td>

AUTO

</td>

<td>

<button
class="btn"
onclick="tambah()"
>

+

</button>

</td>

</tr>

</table>

`;

}



function tambah(){

const nama=
document.getElementById(
"nama"
).value;

const supplier=
document.getElementById(
"supplier"
).value;

const buy=
Number(
document.getElementById(
"buy"
).value
);

const buyunit=
document.getElementById(
"buyunit"
).value;

const conv=
Number(
document.getElementById(
"conv"
).value
);

const use=
document.getElementById(
"use"
).value;

const price=
Number(
document.getElementById(
"price"
).value
);

if(
!nama||
!supplier||
!buy||
!conv||
!price
){

alert(
"Lengkapi data"
);

return;

}

const cost=
Math.round(
price/conv
);

raw.push({

id:
"RM"+
String(
raw.length+1
)
.padStart(
3,
"0"
),

nama,

supplier,

buyQty:
buy,

buyUnit:
buyunit,

convQty:
conv,

useUnit:
use,

price,

cost

});

rawMaterial();

}



function hapus(i){

raw.splice(
i,
1
);

rawMaterial();

}



function logout(){

window.location.href="/";

}



dashboard();

</script>

</body>

</html>
