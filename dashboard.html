<script>

function tambahBahan(){

const input=
document.querySelectorAll(
"input"
);

const select=
document.querySelectorAll(
"select"
);


/* AMBIL DATA */

const nama=
input[0].value;

const merk=
input[1].value;

const kategori=
select[0].value;

const supplier=
input[2].value;

const qty=
input[3].value;

const buyUnit=
select[1].value;

const harga=
input[4].value;

const conversion=
input[5].value;

const unit=
select[2].value;

const waste=
input[6].value;


/* VALIDASI */

if(
!nama||
!harga||
!conversion
){

alert(
"Lengkapi data dulu"
);

return;

}


/* HITUNG */

const hargaUnit=

(
Number(harga)
/
Number(conversion)
)

.toFixed(2);


/* UPDATE CARD */

document
.querySelector(
".name"
)
.innerHTML=
nama;


document
.querySelector(
".sub"
)
.innerHTML=

kategori

+

" • "

+

merk;



document
.querySelectorAll(
".big"
)

[0]

.innerHTML=

supplier;



document
.querySelectorAll(
".big"
)

[1]

.innerHTML=

qty

+

" "

+

buyUnit;



document
.querySelectorAll(
".big"
)

[2]

.innerHTML=

conversion

+

" "

+

unit;



document
.querySelectorAll(
".big"
)

[3]

.innerHTML=

waste

+

"%";



document
.querySelector(
".headerCard div:last-child"
)

.innerHTML=

"Rp "

+

hargaUnit

+

" / "

+

unit;



/* RESET */

input[0].value="";
input[1].value="";
input[2].value="";
input[4].value="";
input[5].value="";


alert(
"Bahan berhasil ditambah 🚀"
);

}



/* HUBUNGKAN TOMBOL */

window.onload=

function(){

const tombol=

document
.querySelectorAll(
".btn"
);

tombol.forEach(

btn=>{

if(

btn.innerText

.includes(

"Tambah"

)

){

btn.onclick=
tambahBahan;

}

}

);

};

</script>
