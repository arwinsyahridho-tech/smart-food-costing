<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SFC Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07173a;
font-family:Arial;
color:white;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{
width:280px;
background:#102766;
padding:30px;
}

.logo{
font-size:36px;
font-weight:bold;
margin-bottom:40px;
}

.item{
padding:16px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}

.item:hover{
background:#1b3d91;
}

.main{
flex:1;
padding:40px;
overflow:auto;
}

.btn{

padding:10px 18px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

cursor:pointer;

}

.card{

background:#12286b;

padding:25px;

border-radius:18px;

margin-top:20px;

width:260px;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th{

padding:16px;

background:#12286b;

text-align:left;

}

td{

padding:14px;

border-bottom:1px solid #1a3f94;

}

input{

width:100%;

padding:10px;

background:#0f2559;

border:none;

border-radius:8px;

color:white;

}

.logout{

margin-top:40px;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div
class="item"
onclick="dashboard()"
>

🏠 Dashboard

</div>

<div
class="item"
onclick="rawMaterial()"
>

📦 Raw Material

</div>

<div class="item">

🔒 Preparation

</div>

<div class="item">

🔒 Recipe

</div>

<div class="item">

🔒 Menu

</div>

<div class="item">

🔒 HPP

</div>

<div class="logout">

<button
class="btn"
onclick="logout()"
>

Logout

</button>

</div>

</div>


<div
class="main"
id="app"
>

</div>

</div>


<script>

const app =
document.getElementById(
"app"
);

let data=[];



function dashboard(){

app.innerHTML=`

<h1>

Dashboard

</h1>

<br>

<div class="card">

Total Raw Material

<br><br>

<h1>

${data.length}

</h1>

</div>

`;

}



function rawMaterial(){

let rows="";

data.forEach((x,i)=>{

rows+=`

<tr>

<td>

${i+1}

</td>

<td>

${x.nama}

</td>

<td>

${x.unit}

</td>

<td>

Rp ${x.harga}

</td>

<td>

<button
class="btn"
onclick="hapus(${i})"
>

Hapus

</button>

</td>

</tr>

`;

});



app.innerHTML=`

<h1>

Raw Material Master

</h1>

<table>

<tr>

<th>No</th>

<th>Nama</th>

<th>Unit</th>

<th>Harga</th>

<th>Aksi</th>

</tr>

${rows}

<tr>

<td>

+

</td>

<td>

<input
id="nama"
placeholder="Nama bahan"
>

</td>

<td>

<input
id="unit"
placeholder="Unit"
>

</td>

<td>

<input
id="harga"
placeholder="Harga"
>

</td>

<td>

<button
class="btn"
onclick="tambah()"
>

Tambah

</button>

</td>

</tr>

</table>

`;

}



function tambah(){

const nama =
document
.getElementById(
"nama"
)
.value;

const unit =
document
.getElementById(
"unit"
)
.value;

const harga =
document
.getElementById(
"harga"
)
.value;

if(
!nama||
!unit||
!harga
){

alert(
"Isi semua dulu"
);

return;

}

data.push({

nama,
unit,
harga

});

rawMaterial();

}



function hapus(i){

data.splice(
i,
1
);

rawMaterial();

}



function logout(){

window.location.href=
"/";

}



dashboard();

</script>

</body>

</html>
