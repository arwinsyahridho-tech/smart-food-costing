<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SFC Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07173a;
font-family:Arial;
color:white;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{

width:270px;

background:#102766;

padding:30px;

}

.logo{

font-size:34px;

font-weight:bold;

margin-bottom:40px;

}

.item{

padding:16px;

margin-bottom:10px;

border-radius:12px;

cursor:pointer;

}

.item:hover{

background:#1b3d91;

}

.main{

flex:1;

padding:35px;

overflow:auto;

}

.pageTitle{

font-size:32px;

margin-bottom:25px;

}

.panel{

background:#102766;

padding:28px;

border-radius:20px;

margin-bottom:25px;

}

.grid{

display:grid;

grid-template-columns:
repeat(
2,
1fr
);

gap:15px;

}

input,
select{

width:100%;

padding:14px;

background:#0b1f53;

border:none;

border-radius:12px;

color:white;

}

.btn{

padding:14px;

border:none;

background:#2563eb;

color:white;

border-radius:12px;

cursor:pointer;

}

.search{

margin-top:20px;

margin-bottom:20px;

}

.card{

background:#102766;

padding:20px;

border-radius:18px;

margin-bottom:15px;

}

.row{

display:flex;

justify-content:space-between;

margin-top:10px;

}

.small{

opacity:.7;

font-size:14px;

}

.price{

font-size:22px;

margin-top:10px;

}

.action{

display:flex;

gap:10px;

margin-top:15px;

}

.danger{

background:#d62828;

}

.logout{

margin-top:40px;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div
class="item"
onclick="dashboard()"
>

🏠 Dashboard

</div>

<div
class="item"
onclick="rawMaterial()"
>

📦 Raw Material

</div>

<div class="item">

🔒 Preparation

</div>

<div class="item">

🔒 Recipe

</div>

<div class="item">

🔒 Menu

</div>

<div class="item">

🔒 HPP

</div>

<div class="logout">

<button
class="btn"
onclick="logout()"
>

Logout

</button>

</div>

</div>


<div
class="main"
id="app"
>

</div>

</div>


<script>

let raw=[];

const app=
document.getElementById(
"app"
);



function dashboard(){

app.innerHTML=`

<div class="pageTitle">

Dashboard

</div>

<div class="panel">

Total Raw Material

<br><br>

<h1>

${raw.length}

</h1>

</div>

`;

}



function rawMaterial(){

render();

}



function render(){

let cards="";

raw.forEach((r,i)=>{

cards+=`

<div class="card">

<h2>

${r.nama}

</h2>

<div class="small">

${r.category}

</div>

<div class="row">

<div>

Supplier

<br>

<b>

${r.supplier}

</b>

</div>

<div>

${r.buyQty}
${r.buyUnit}

</div>

</div>

<div class="row">

<div>

Conversion

<br>

${r.convQty}
${r.useUnit}

</div>

<div>

Waste

<br>

${r.waste}%

</div>

</div>

<div class="price">

Rp
${r.cost}

/
${r.useUnit}

</div>

<div class="action">

<button
class="btn"
onclick="hapus(${i})"
>

Hapus

</button>

</div>

</div>

`;

});


app.innerHTML=`

<div class="pageTitle">

Raw Material Master

</div>


<div class="panel">

<div class="grid">

<input
id="nama"
placeholder="Nama Bahan"
>

<input
id="merk"
placeholder="Merk"
>

<select id="category">

<option>Bahan Basah</option>

<option>Bahan Kering</option>

<option>Buah</option>

<option>Packaging</option>

<option>Topping</option>

</select>

<input
id="supplier"
placeholder="Supplier"
>

<input
id="buy"
placeholder="Qty Beli"
>

<select id="buyunit">

<option>Kg</option>

<option>Liter</option>

<option>Pack</option>

</select>

<input
id="price"
placeholder="Harga Beli"
>

<input
id="conv"
placeholder="Conversion Qty"
>

<select id="use">

<option>gr</option>

<option>ml</option>

<option>pcs</option>

</select>

<input
id="waste"
value="5"
>

</div>

<br>

<button
class="btn"
onclick="tambah()"
>

Tambah Bahan

</button>

</div>


<input
class="search"
placeholder="Cari bahan..."
oninput="cari(this.value)"
>

<div
id="list"
>

${cards}

</div>

`;

}



function tambah(){

const nama=
document.getElementById(
"nama"
).value;

if(!nama)
return;

const price=
Number(
document.getElementById(
"price"
).value
);

const conv=
Number(
document.getElementById(
"conv"
).value
);

raw.unshift({

nama,

merk:
document.getElementById(
"merk"
).value,

category:
document.getElementById(
"category"
).value,

supplier:
document.getElementById(
"supplier"
).value,

buyQty:
document.getElementById(
"buy"
).value,

buyUnit:
document.getElementById(
"buyunit"
).value,

price,

convQty:
conv,

useUnit:
document.getElementById(
"use"
).value,

waste:
document.getElementById(
"waste"
).value,

cost:
Math.round(
price/conv
)

});

render();

}



function hapus(i){

raw.splice(
i,
1
);

render();

}



function cari(text){

document
.querySelectorAll(
".card"
)

.forEach(c=>{

c.style.display=

c.innerText
.toLowerCase()
.includes(
text.toLowerCase()
)

?

"block"

:

"none";

});

}



function logout(){

window.location.href="/";

}



dashboard();

</script>

</body>

</html>
