<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SFC Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07173a;
font-family:Arial;
color:white;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{

width:260px;

background:#102766;

padding:30px;

}

.logo{

font-size:32px;

font-weight:bold;

margin-bottom:40px;

}

.item{

padding:16px;

border-radius:12px;

margin-bottom:10px;

cursor:pointer;

}

.item:hover{

background:#1b3d91;

}

.main{

flex:1;

padding:40px;

}

.card{

background:#102766;

padding:30px;

border-radius:20px;

max-width:700px;

}

.field{

margin-bottom:18px;

}

label{

display:block;

margin-bottom:8px;

opacity:.7;

}

input,
select{

width:100%;

height:52px;

padding:0 14px;

background:#0d2158;

border:none;

border-radius:12px;

color:white;

}

.btn{

padding:14px 22px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

}

.result{

margin-top:25px;

}

.rawCard{

background:#0d2158;

padding:18px;

border-radius:14px;

margin-top:12px;

}

.logout{

margin-top:40px;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div class="item">

📦 Raw Material

</div>

<div class="logout">

<button
class="btn"
onclick="logout()"
>

Logout

</button>

</div>

</div>


<div class="main">

<h1>

Raw Material Master

</h1>

<br>

<div class="card">

<div class="field">

<label>Nama Bahan</label>

<input
id="nama"
placeholder="Tepung Terigu"
>

</div>


<div class="field">

<label>Supplier</label>

<input
id="supplier"
placeholder="Supplier"
>

</div>


<div class="field">

<label>Buy Unit</label>

<select
id="unit"
>

<option>Kg</option>

<option>Pack</option>

<option>Liter</option>

</select>

</div>


<div class="field">

<label>Harga Beli</label>

<input
id="harga"
placeholder="12000"
>

</div>


<button
class="btn"
onclick="tambah()"
>

+ Tambah Bahan

</button>

</div>


<div
class="result"
id="hasil"
>

</div>

</div>

</div>


<script>

function tambah(){

const nama=
document
.getElementById(
"nama"
)
.value;

const supplier=
document
.getElementById(
"supplier"
)
.value;

const unit=
document
.getElementById(
"unit"
)
.value;

const harga=
document
.getElementById(
"harga"
)
.value;


if(
!nama||
!supplier||
!harga
){

alert(
"Lengkapi dulu"
);

return;

}


document
.getElementById(
"hasil"
)

.innerHTML

+=

`

<div
class="rawCard"
>

<b>

${nama}

</b>

<br><br>

Supplier:
${supplier}

<br>

Unit:
${unit}

<br>

Harga:
Rp ${harga}

</div>

`;



document
.getElementById(
"nama"
)
.value="";

document
.getElementById(
"supplier"
)
.value="";

document
.getElementById(
"harga"
)
.value="";

}



function logout(){

window.location.href=
"/";

}

</script>

</body>

</html>
