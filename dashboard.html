<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SFC Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#07173a;

font-family:Arial;

color:white;

}

.wrapper{

display:flex;

height:100vh;

}

.sidebar{

width:280px;

background:#102766;

padding:30px;

}

.logo{

font-size:40px;

margin-bottom:50px;

}

.item{

padding:16px;

border-radius:12px;

margin-bottom:10px;

cursor:pointer;

}

.item:hover{

background:#1b3d91;

}

.main{

flex:1;

padding:50px;

}

.btn{

padding:12px 18px;

background:#2563eb;

border:none;

border-radius:10px;

color:white;

cursor:pointer;

}

.card{

margin-top:20px;

background:#12286b;

padding:25px;

border-radius:20px;

width:250px;

}

table{

width:100%;

margin-top:20px;

border-collapse:collapse;

}

th,td{

padding:18px;

text-align:left;

}

th{

background:#12286b;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div
class="item"
onclick="dashboard()"
>

🏠 Dashboard

</div>

<div
class="item"
onclick="raw()"
>

📦 Raw Material

</div>

<div class="item">

🔒 Preparation

</div>

<div class="item">

🔒 Recipe

</div>

<div class="item">

🔒 Menu

</div>

<div class="item">

🔒 HPP

</div>

<br><br>

<button
class="btn"
onclick="logout()"
>

Logout

</button>

</div>


<div
class="main"
id="app"
>

</div>

</div>


<script>

function dashboard(){

document.getElementById(
"app"
).innerHTML=`

<h1>

Dashboard

</h1>

<br>

<p>

Selamat datang 🚀

</p>

<div class="card">

Total Raw Material

<br><br>

<h1>

0

</h1>

</div>

`;

}



function raw(){

document.getElementById(
"app"
).innerHTML=`

<div
style="
display:flex;
justify-content:space-between;
align-items:center;
"
>

<h1>

Raw Material

</h1>

<button
class="btn"
onclick="tambah()"
>

+ Tambah

</button>

</div>


<table>

<tr>

<th>

Nama

</th>

<th>

Unit

</th>

<th>

Harga

</th>

</tr>


<tr>

<td>

Belum ada data

</td>

<td>

-

</td>

<td>

-

</td>

</tr>

</table>

`;

}



function tambah(){

alert(
"Form tambah dibuat berikutnya 🚀"
);

}


function logout(){

window.location.href="/";

}


dashboard();

</script>

</body>

</html>
