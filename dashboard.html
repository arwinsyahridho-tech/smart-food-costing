<script>

document.addEventListener(
"DOMContentLoaded",

function(){

const tombolTambah =
Array
.from(
document.querySelectorAll(
".btn"
)
)

.find(
btn=>

btn.textContent
.includes(
"Tambah"
)

);

if(
tombolTambah
){

tombolTambah
.addEventListener(
"click",
tambahBahan
);

}

}

);



function tambahBahan(){


const input =
document
.querySelectorAll(
"input"
);

const select =
document
.querySelectorAll(
"select"
);


/* AMBIL VALUE */

const nama =
input[0]?.value
.trim();

const merk =
input[1]?.value
.trim();

const kategori =
select[0]?.value;

const supplier =
input[2]?.value
.trim();

const qty =
input[3]?.value
.trim();

const buyUnit =
select[1]?.value;

const harga =
Number(
input[4]?.value
);

const conversion =
Number(
input[5]?.value
);

const unit =
select[2]?.value;

const waste =
input[6]?.value;



/* VALIDASI */

if(

!nama

||

!harga

||

!conversion

){

alert(
"Lengkapi data dulu"
);

return;

}



/* HITUNG */

const hargaUnit =

(
harga
/
conversion
)

.toFixed(
2
);



/* CARI CARD */

const card =

document
.querySelector(
".card"
);

if(
!card
){

alert(
"Card tidak ditemukan"
);

return;

}



/* UPDATE */

card.innerHTML=

`

<div class="headerCard">

<div>

<div class="name">

${nama}

</div>

<div class="sub">

${kategori}
•
${merk||"-"}

</div>

</div>

<div>

Rp
${hargaUnit}
/${unit}

</div>

</div>



<div class="info">

<div class="box">

<div class="small">

Supplier

</div>

<div class="big">

${supplier||"-"}

</div>

</div>



<div class="box">

<div class="small">

Pembelian

</div>

<div class="big">

${qty}
${buyUnit}

</div>

</div>



<div class="box">

<div class="small">

Konversi

</div>

<div class="big">

${conversion}
${unit}

</div>

</div>



<div class="box">

<div class="small">

Waste

</div>

<div class="big">

${waste}%

</div>

</div>



<div class="box">

<div class="small">

Status

</div>

<div class="big">

ACTIVE

</div>

</div>

</div>

`;



/* RESET */

input.forEach(

(el,index)=>{

if(
index!==3
&&
index!==6
){

el.value="";

}

}

);



alert(
"Bahan berhasil ditambah 🚀"
);

}

</script>
