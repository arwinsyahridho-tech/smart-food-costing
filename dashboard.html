<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SFC Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07173a;
font-family:Arial;
color:white;
}

.wrapper{
display:flex;
height:100vh;
}

.sidebar{

width:250px;

background:#102766;

padding:30px;

}

.logo{

font-size:34px;

font-weight:bold;

margin-bottom:45px;

}

.item{

padding:16px;

margin-bottom:10px;

border-radius:12px;

cursor:pointer;

}

.item:hover{

background:#1a3d95;

}

.logout{

margin-top:40px;

}

.main{

flex:1;

padding:40px;

overflow:auto;

}

.title{

font-size:44px;

margin-bottom:25px;

}

.section{

background:#102766;

padding:28px;

border-radius:22px;

margin-bottom:24px;

}

.sectionTitle{

font-size:20px;

margin-bottom:20px;

opacity:.9;

}

.grid{

display:grid;

grid-template-columns:

1fr 1fr;

gap:18px;

}

.grid3{

display:grid;

grid-template-columns:

1fr 1fr 1fr;

gap:18px;

}

.field{

display:flex;

flex-direction:column;

gap:10px;

}

label{

font-size:14px;

opacity:.7;

}

input,
select{

height:56px;

padding:0 18px;

background:#0d2158;

border:none;

border-radius:14px;

color:white;

font-size:16px;

}

.btn{

margin-top:25px;

height:54px;

padding:0 24px;

border:none;

border-radius:14px;

background:#2563eb;

color:white;

cursor:pointer;

}

.search{

margin:30px 0;

}

.search input{

width:100%;

}

.card{

background:#102766;

padding:25px;

border-radius:22px;

}

.headerCard{

display:flex;

justify-content:space-between;

}

.name{

font-size:26px;

font-weight:bold;

}

.sub{

opacity:.6;

margin-top:8px;

}

.info{

display:grid;

grid-template-columns:

repeat(5,1fr);

gap:16px;

margin-top:25px;

}

.box{

background:#0d2158;

padding:18px;

border-radius:14px;

}

.small{

font-size:12px;

opacity:.6;

}

.big{

margin-top:10px;

font-size:18px;

}

@media(max-width:900px){

.sidebar{
display:none;
}

.grid,
.grid3,
.info{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div class="item">
🏠 Dashboard
</div>

<div class="item">
📦 Raw Material
</div>

<div class="item">
🔒 Preparation
</div>

<div class="item">
🔒 Recipe
</div>

<div class="item">
🔒 Menu
</div>

<div class="item">
🔒 HPP
</div>

<div class="logout">

<button class="btn">

Logout

</button>

</div>

</div>



<div class="main">

<div class="title">

Raw Material Master

</div>



<!-- IDENTITAS -->

<div class="section">

<div class="sectionTitle">

IDENTITAS BAHAN

</div>

<div class="grid">

<div class="field">

<label>Nama Bahan</label>

<input
placeholder="Tepung Terigu"
>

</div>

<div class="field">

<label>Merk</label>

<input
placeholder="Segitiga Biru"
>

</div>

<div class="field">

<label>Category</label>

<select>

<option>Bahan Kering</option>

<option>Bahan Basah</option>

<option>Buah</option>

<option>Packaging</option>

</select>

</div>

<div class="field">

<label>Supplier</label>

<input
placeholder="Sari Murni"
>

</div>

</div>

</div>



<!-- PEMBELIAN -->

<div class="section">

<div class="sectionTitle">

PEMBELIAN

</div>

<div class="grid3">

<div class="field">

<label>Qty Beli</label>

<input value="1">

</div>

<div class="field">

<label>Buy Unit</label>

<select>

<option>Kg</option>

<option>Pack</option>

<option>Liter</option>

<option>Pcs</option>

</select>

</div>

<div class="field">

<label>Harga Beli</label>

<input
placeholder="12500"
>

</div>

</div>

</div>



<!-- KONVERSI -->

<div class="section">

<div class="sectionTitle">

KONVERSI

</div>

<div class="grid3">

<div class="field">

<label>Conversion Qty</label>

<input
placeholder="1000"
>

</div>

<div class="field">

<label>Unit Dasar</label>

<select>

<option>gr</option>

<option>ml</option>

<option>pcs</option>

</select>

</div>

<div class="field">

<label>Default Waste %</label>

<input value="5">

</div>

</div>

<button
id="tambahBtn"
class="btn"
>

+ Tambah Bahan

</button>

</div>



<!-- SEARCH -->

<div class="search">

<input
placeholder="Cari bahan..."
>

</div>



<!-- CARD -->

<div
class="card"
id="previewCard"
>

<div class="headerCard">

<div>

<div class="name">

Tepung Terigu

</div>

<div class="sub">

Bahan Kering • Segitiga Biru

</div>

</div>

<div>

Rp 13 / gr

</div>

</div>


<div class="info">

<div class="box">

<div class="small">

Supplier

</div>

<div class="big">

Sari Murni

</div>

</div>


<div class="box">

<div class="small">

Pembelian

</div>

<div class="big">

1 Pack

</div>

</div>


<div class="box">

<div class="small">

Konversi

</div>

<div class="big">

1000 gr

</div>

</div>


<div class="box">

<div class="small">

Waste

</div>

<div class="big">

5%

</div>

</div>


<div class="box">

<div class="small">

Status

</div>

<div class="big">

ACTIVE

</div>
<div
style="
margin-top:20px;
display:flex;
gap:12px;
"
>

<button
id="updateBtn"
class="btn"
style="margin:0"
>

Update

</button>


<button
id="hapusBtn"
class="btn"
style="
margin:0;
background:#d62828;
"
>

Hapus

</button>

</div>
</div>

</div>

</div>

</div>

</div>
<script>

document
.getElementById(
"tambahBtn"
)

.addEventListener(

"click",

function(){

const input =
document.querySelectorAll(
"input"
);

const select =
document.querySelectorAll(
"select"
);


/* AMBIL DATA */

const nama =
input[0].value;

const merk =
input[1].value;

const kategori =
select[0].value;

const supplier =
input[2].value;

const qty =
input[3].value;

const buyUnit =
select[1].value;

const harga =
input[4].value;

const conversion =
input[5].value;

const unit =
select[2].value;

const waste =
input[6].value;


/* VALIDASI */

if(
!nama||
!harga||
!conversion
){

alert(
"Lengkapi data dulu"
);

return;

}


/* HITUNG */

const hargaUnit =

(
Number(harga)
/
Number(conversion)
)

.toFixed(2);


/* UPDATE CARD */

document
.querySelector(
".name"
)

.innerText =

nama;


document
.querySelector(
".sub"
)

.innerText =

kategori
+
" • "
+
merk;



document
.querySelectorAll(
".big"
)

[0]

.innerText =

supplier;



document
.querySelectorAll(
".big"
)

[1]

.innerText =

qty
+
" "
+
buyUnit;



document
.querySelectorAll(
".big"
)

[2]

.innerText =

conversion
+
" "
+
unit;



document
.querySelectorAll(
".big"
)

[3]

.innerText =

waste
+
"%";



document
.querySelector(
".headerCard > div:last-child"
)

.innerText =

"Rp "
+
hargaUnit
+
" / "
+
unit;



/* RESET */

input[0].value="";
input[1].value="";
input[2].value="";
input[4].value="";
input[5].value="";


alert(
"Bahan berhasil ditambah 🚀"
);

}

);

</script>
  <script>

/* UPDATE */

document
.getElementById(
"updateBtn"
)

.onclick=

function(){

document
.getElementById(
"tambahBtn"
)

.click();

alert(
"Data berhasil diupdate 🚀"
);

};



/* HAPUS */

document
.getElementById(
"hapusBtn"
)

.onclick=

function(){

document
.querySelector(
".name"
)

.innerText=

"Tepung Terigu";


document
.querySelector(
".sub"
)

.innerText=

"Bahan Kering • Segitiga Biru";



document
.querySelectorAll(
".big"
)

[0]

.innerText=

"Sari Murni";


document
.querySelectorAll(
".big"
)

[1]

.innerText=

"1 Pack";


document
.querySelectorAll(
".big"
)

[2]

.innerText=

"1000 gr";


document
.querySelectorAll(
".big"
)

[3]

.innerText=

"5%";



document
.querySelector(
".headerCard > div:last-child"
)

.innerText=

"Rp 13 / gr";


alert(
"Data dihapus 🗑️"
);

};

</script>
</body>

</html>
