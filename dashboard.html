<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Smart Food Costing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#07173a;
color:white;
font-family:Arial;

}

.wrapper{

display:flex;

height:100vh;

}

.sidebar{

width:300px;

background:#102766;

padding:30px;

}

.logo{

font-size:34px;

font-weight:bold;

margin-bottom:50px;

}

.menuItem{

padding:16px;

cursor:pointer;

border-radius:12px;

margin-bottom:10px;

font-size:22px;

}

.menuItem:hover{

background:#1a3f94;

}

.main{

flex:1;

padding:50px;

}

.card{

background:#12286b;

padding:30px;

border-radius:20px;

width:250px;

margin-top:20px;

}

.top{

display:flex;

justify-content:space-between;

align-items:center;

}

.btn{

padding:12px 20px;

background:#2563eb;

border:none;

border-radius:12px;

color:white;

cursor:pointer;

}

table{

width:100%;

margin-top:20px;

border-collapse:collapse;

}

th{

padding:18px;

background:#12286b;

text-align:left;

}

td{

padding:18px;

}

.logout{

margin-top:50px;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

🍽️ SFC

</div>

<div
class="menuItem"
id="dashboardBtn"
>

🏠 Dashboard

</div>

<div
class="menuItem"
id="rawBtn"
>

📦 Raw Material

</div>

<div class="menuItem">

🔒 Preparation

</div>

<div class="menuItem">

🔒 Recipe

</div>

<div class="menuItem">

🔒 Menu

</div>

<div class="menuItem">

🔒 HPP

</div>


<div class="logout">

<button
class="btn"
onclick="logout()"
>

Logout

</button>

</div>

</div>


<div
class="main"
id="content"
>

</div>

</div>


<script>

const content =
document.getElementById(
"content"
);


function showDashboard(){

content.innerHTML=`

<h1>

Dashboard

</h1>

<br>

<p>

Selamat datang 🚀

</p>

<div class="card">

<h3>

Total Raw Material

</h3>

<br>

<h1>

0

</h1>

</div>

`;

}


function showRaw(){

content.innerHTML=`

<div class="top">

<h1>

Raw Material

</h1>

<button
class="btn"
onclick="addData()"
>

+ Tambah

</button>

</div>

<table>

<tr>

<th>Nama</th>

<th>Unit</th>

<th>Harga</th>

</tr>

<tr>

<td>Belum ada data</td>

<td>-</td>

<td>-</td>

</tr>

</table>

`;

}


function addData(){

alert(
"Form tambah dibuat berikutnya 🚀"
);

}


function logout(){

window.location.href="/";

}



document
.getElementById(
"dashboardBtn"
)
.addEventListener(
"click",
showDashboard
);


document
.getElementById(
"rawBtn"
)
.addEventListener(
"click",
showRaw
);


showDashboard();

</script>

</body>

</html>
